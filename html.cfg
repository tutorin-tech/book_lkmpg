\Preamble{xhtml}

\Configure{tableofcontents*}{chapter,section,subsection}

\Css{html {
    overflow-x: hidden;
}}

\Css{@font-face {
  font-family: Manrope;
  src: url(Manrope_variable.ttf);
}}

\Css{body {
    box-sizing: border-box;
    width: auto;
    max-width: none;
    min-height: 100vh;
    padding: 1rem 2rem 2rem 24rem;
    margin: 0;
    overflow-x: hidden;
    background-color: \#F4ECD8;
    color: \#5B464B;
    line-height: 1.5;
}}

\Css{body > :not(.tableofcontents) {
    box-sizing: border-box;
    width: auto;
    max-width: 70rem;
    margin-left: 0;
    margin-right: 0;
}}

\Css{.tableofcontents {
    position: fixed;
    top: 1rem;
    left: 1rem;
    bottom: 1rem;
    z-index: 10;
    width: 19rem;
    max-width: none;
    margin: 0;
    overflow-y: auto;
    padding: 1.5rem 1.25rem 2rem;
    border-right: 1px solid \#d6c6aa;
    background: linear-gradient(180deg, \#efe4ca 0\%, \#eadcbf 100\%);
    box-shadow: inset -1px 0 0 rgba(91, 70, 75, 0.08);
}}

\Css{.tableofcontents::before {
    content: "Contents";
    display: block;
    margin-bottom: 1rem;
    font-family: Manrope;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: \#5B464B;
}}

\Css{.chapterToc, .sectionToc, .subsectionToc {
    display: block;
    font-family: Manrope;
}}

\Css{.chapterToc {
    margin-top: 1.1rem;
    padding-top: 0.9rem;
    border-top: 1px solid rgba(91, 70, 75, 0.14);
    font-size: 1rem;
    font-weight: 800;
    line-height: 1.45;
}}

\Css{.chapterToc:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
}}

\Css{.chapterToc a {
    color: \#5B464B;
    text-decoration: none;
    line-height: inherit;
    font-weight: inherit;
}}

\Css{.sectionToc {
    margin-top: 0.35rem;
    margin-left: 0;
    font-size: 0.95rem;
    line-height: 1.45;
}}

\Css{.sectionToc a {
    color: \#7a5a4f;
    text-decoration: none;
}}

\Css{.subsectionToc {
    margin-top: 0.18rem;
    margin-left: 0.9rem;
    font-size: 0.82rem;
    line-height: 1.35;
}}

\Css{.subsectionToc a {
    color: \#6b4f54;
    text-decoration: none;
}}

\Css{.tableofcontents a {
    overflow-wrap: anywhere;
    word-break: break-word;
}}

\Css{.tableofcontents a:hover {
    color: \#0060DF;
    text-decoration: underline;
}}

\Css{.likechapterHead\#contents {
    display: none;
}}

\Css{a {
    color: \#0060DF;
}}

\Css{a:focus-visible {
    outline: 3px solid \#0060DF;
    outline-offset: 2px;
    border-radius: 2px;
}}

\Css{p, a {
    font-size: 1.2rem;
    font-family: Manrope;
}}

\Css{p + pre {
    font-size: 1.1em;
}}

\Css{div.author {
    white-space: normal;
}}

\Css{.maketitle {
    min-height: auto;
    padding: 0;
    margin-top: 3rem;
    margin-bottom: 1rem;
}}

\Css{.maketitle + p {
    width: min(24rem, 100\%);
    max-width: 24rem;
    float: none;
    margin: 1.5rem auto 2rem;
}}

\Css{.maketitle + p img {
    display: block;
    width: 100\%;
    max-width: 100\%;
    max-height: 78vh;
    margin: 0;
}}

\Css{.maketitle .titleHead {
    margin: 0;
    text-align: center;
    font-family: Manrope;
    max-width: none;
    font-size: 4.6rem;
    line-height: 0.92;
    letter-spacing: -0.05em;
}}

\Css{.maketitle .author {
    text-align: center;
    max-width: none;
    margin-top: 1.5rem;
    color: \#735c61;
}}

\Css{.maketitle .author span {
    font-size: 1.55rem;
    line-height: 1.5;
}}

\Css{.maketitle .date {
    text-align: center;
    margin-top: 1rem;
    max-width: none;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: \#8c7277;
}}

\Css{img.math {
    height: 1rem;
    vertical-align: top;
}}

\Css{pre.fancyvrb {
    white-space: pre;
}}

\Css{figure, .fancyvrb, .verbatim {
    margin-inline: 0;
    overflow-x: auto;
}}

\Css{.ecrm-0500 {
    font-size: 70\%;
    font-style: italic;
    color: gray;
    width: 1.5rem;
    display: inline-block;
    -webkit-user-select: none;
    -moz-user-select: none;
    -o-user-select: none;
    user-select: none;
}}

\Css{.page-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
    margin: 0 0 1.5rem;
}}

\Css{@media (max-width: 1100px) {
    body {
        padding: 0 1rem 2rem;
    }
    body > :not(.tableofcontents) {
        width: auto;
        max-width: none;
        margin-left: auto;
        margin-right: auto;
    }
    .tableofcontents {
        position: static;
        width: auto;
        max-width: 55rem;
        margin: 1rem auto 1.5rem;
        border-right: 0;
        border: 1px solid \#d6c6aa;
        border-radius: 14px;
        box-shadow: none;
    }
    .maketitle {
        min-height: auto;
        margin-top: 0;
    }
    .page-actions {
        justify-content: center;
    }
    .maketitle + p {
        width: min(22rem, 100\%);
        max-width: 22rem;
        margin-top: 1rem;
    }
}}

\Css{@media (max-width: 900px) {
    .maketitle + p {
        width: 100\%;
        max-width: 24rem;
        margin: 1rem auto 0;
    }
    .maketitle .titleHead,
    .maketitle .author,
    .maketitle .date {
        max-width: none;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
    }
    .maketitle + p img {
        max-height: none;
        margin: 0 auto;
    }
}}

\Css{@media print {
    body {
        display: block;
        padding: 0;
    }
    .tableofcontents {
        position: static;
        width: auto;
        max-height: none;
        border-right: 0;
        box-shadow: none;
        background: none;
        page-break-after: always;
    }
    .page-actions {
        display: none;
    }
    .maketitle {
        min-height: auto;
        margin: 0;
    }
    .maketitle .titleHead,
    .maketitle .author,
    .maketitle .date {
        max-width: none;
    }
    .maketitle + p {
        float: none;
        width: auto;
        max-width: 20rem;
        margin: 1rem 0 0;
    }
}}

\Configure{@HEAD}{\HCode{
    <script async defer src="https://buttons.github.io/buttons.js"></script>
\Hnewline}}

\Configure{@BODY}{\ifvmode \IgnorePar\fi \EndP\HCode{
    <div class="page-actions">
        <a class="github-button" href="https://github.com/sysprog21/lkmpg" data-size="large" aria-label="View on GitHub">View on GitHub</a>
        <a class="github-button" href="https://github.com/sysprog21/lkmpg/releases/download/latest/lkmpg.pdf" data-icon="octicon-download" data-size="large" aria-label="Download PDF document">Download PDF document</a>
    </div>
    \Hnewline}}

\begin{document}
\EndPreamble
